spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 900000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.perfectjob: INFO
    org.springframework.security: WARN
