spring:
  application:
    name: perfectjob-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/perfectjob}
    username: ${DB_USER:perfectjob}
    password: ${DB_PASSWORD:perfectjob}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:default-temporary-secret-change-in-production-with-32-chars-min}
  access-expiration: 900000

server:
  port: 8080
  servlet:
    context-path: /api