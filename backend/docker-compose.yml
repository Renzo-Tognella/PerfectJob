services:
  db:
    image: pgvector/pgvector:pg17
    container_name: perfectjob-db
    environment:
      POSTGRES_DB: perfectjob
      POSTGRES_USER: perfectjob
      POSTGRES_PASSWORD: perfectjob
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfectjob"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perfectjob-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/perfectjob
      DATABASE_USERNAME: perfectjob
      DATABASE_PASSWORD: perfectjob
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
