spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    properties:
      hibernate:
        format_sql: false
    show-sql: false

logging:
  level:
    com.perfectjob: INFO
    org.hibernate.SQL: WARN
